<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SitMan Web — 复读机</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-start: #eef3f8;
  --bg-end: #f9fbfd;
  --surface: rgba(255, 255, 255, 0.72);
  --surface-strong: rgba(255, 255, 255, 0.92);
  --surface-soft: rgba(255, 255, 255, 0.56);
  --surface-muted: rgba(245, 248, 252, 0.88);
  --text-primary: #18212f;
  --text-secondary: #607086;
  --text-soft: #8d99ab;
  --accent: #0a84ff;
  --accent-strong: #0071e3;
  --accent-soft: rgba(10, 132, 255, 0.14);
  --accent-warm: #ff9f0a;
  --border: rgba(124, 142, 164, 0.22);
  --border-strong: rgba(124, 142, 164, 0.34);
  --shadow: 0 20px 50px rgba(135, 149, 166, 0.18);
  --shadow-soft: 0 10px 26px rgba(135, 149, 166, 0.12);
  --danger: #ff5f57;
  --success: #30d158;
  --modal-overlay: rgba(226, 232, 240, 0.48);
  --scrollbar: rgba(124, 142, 164, 0.42);
}

body {
  font-family: "SF Pro Text", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 32%),
    radial-gradient(circle at top right, rgba(10,132,255,0.08), transparent 28%),
    linear-gradient(135deg, var(--bg-start), var(--bg-end));
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
}

/* ===== 标题栏 ===== */
#titlebar {
  background: var(--surface);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-soft);
  backdrop-filter: blur(18px);
  flex-shrink: 0;
}
#titlebar h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}
#current-file-name {
  color: var(--text-secondary);
  font-size: 12px;
}
#play-status {
  margin-left: auto;
  font-size: 11px;
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--accent-soft);
  border: 1px solid rgba(255,255,255,0.7);
}
#theme-switcher {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 999px;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
}
.theme-chip {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.92);
  box-shadow: 0 2px 8px rgba(68, 84, 106, 0.16);
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.theme-chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(68, 84, 106, 0.22);
}
.theme-chip.active {
  transform: scale(1.08);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.theme-chip[data-theme="classic"] { background: linear-gradient(135deg, #0a84ff, #7cc4ff); }
.theme-chip[data-theme="mint"] { background: linear-gradient(135deg, #34c759, #9be7a8); }
.theme-chip[data-theme="graphite"] { background: linear-gradient(135deg, #5e5ce6, #9c9af6); }
.theme-chip[data-theme="sand"] { background: linear-gradient(135deg, #c98b2e, #e5bf77); }

/* ===== 三栏布局 ===== */
#main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  gap: 14px;
  padding: 14px;
}

/* ===== 左栏 ===== */
#left-panel {
  width: 180px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  flex-shrink: 0;
  overflow: hidden;
}
#left-panel .panel-title {
  background: var(--surface-strong);
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
}
#file-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.file-item {
  padding: 9px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
  border: 1px solid transparent;
  border-radius: 14px;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
  margin-bottom: 6px;
}
.file-item:hover {
  background: var(--surface-soft);
  border-color: var(--border);
  transform: translateY(-1px);
}
.file-item.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: #fff;
  border-color: transparent;
  box-shadow: 0 12px 22px rgba(10, 132, 255, 0.18);
}
.file-item .fname {
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.file-item .del-btn {
  font-size: 11px;
  color: inherit;
  opacity: 0.65;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 2px;
  flex-shrink: 0;
}
.file-item .del-btn:hover { opacity: 1; color: var(--danger); }
#left-actions {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid var(--border);
}
.btn {
  display: block;
  background: var(--surface-strong);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 10px;
  cursor: pointer;
  font-size: 11px;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  text-align: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
  user-select: none;
}
.btn:hover {
  background: var(--surface-soft);
  border-color: var(--border-strong);
  transform: translateY(-1px);
}
.btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 12px 24px rgba(10, 132, 255, 0.22);
}
.btn.primary:hover { filter: brightness(1.03); }
.btn.gold {
  background: linear-gradient(135deg, var(--accent-warm), #ffb547);
  border-color: transparent;
  color: #fff;
}
.btn.gold:hover { filter: brightness(1.04); }

/* ===== 中栏 ===== */
#center-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
  gap: 14px;
}

/* 播放控制栏 */
#player-bar {
  background: var(--surface);
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  flex-shrink: 0;
}
#progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
#progress-container {
  flex: 1;
  position: relative;
}
#progress-bar {
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  width: 100%;
  background: rgba(136, 151, 170, 0.22);
  cursor: pointer;
  outline: none;
}
#progress-bar::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid var(--accent);
  box-shadow: 0 4px 12px rgba(10, 132, 255, 0.2);
  cursor: pointer;
}
#time-display {
  font-size: 12px;
  color: var(--accent);
  white-space: nowrap;
  min-width: 100px;
  text-align: right;
  font-weight: 600;
}
#controls-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.ctrl-btn {
  background: var(--surface-strong);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 7px 12px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
}
.ctrl-btn:hover {
  background: var(--surface-soft);
  border-color: var(--border-strong);
  transform: translateY(-1px);
}
.ctrl-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  border-color: transparent;
  color: #fff;
}
#speed-select {
  background: var(--surface-strong);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
}
#ab-info {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
}

/* 标注内容区 */
#notes-area {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.note-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  overflow: hidden;
}
.note-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  background: var(--surface-strong);
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
}
.note-block-title {
  color: var(--text-primary);
  font-weight: 700;
  font-size: 13px;
}
.note-block-toggle { color: var(--accent); font-size: 12px; }
.note-block-body { padding: 12px 14px; background: var(--surface-soft); }
.note-block-body.collapsed { display: none; }

.note-edit {
  width: 100%;
  min-height: 80px;
  background: rgba(255,255,255,0.78);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.5;
  outline: none;
  resize: vertical;
  font-family: inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}
.note-edit:focus {
  border-color: rgba(10, 132, 255, 0.38);
  background: rgba(255,255,255,0.92);
}

/* contenteditable 渲染区 */
.note-rendered {
  min-height: 80px;
  background: rgba(255,255,255,0.78);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}
.note-rendered:focus {
  border-color: rgba(10, 132, 255, 0.38);
  background: rgba(255,255,255,0.92);
}
.note-rendered:empty::before { content: attr(data-placeholder); color: var(--text-soft); }

.ts-link {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  font-weight: 600;
}
.ts-link:hover { color: var(--accent-strong); }

.note-view {
  min-height: 60px;
  padding: 10px 12px;
  color: var(--text-primary);
  line-height: 1.7;
  cursor: text;
  white-space: pre-wrap;
  word-break: break-word;
  border-radius: 14px;
  background: rgba(255,255,255,0.78);
  border: 1px solid var(--border);
}
.note-view .ts-link {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  font-weight: bold;
}
.note-view .ts-link:hover { color: var(--accent-strong); }

/* 听写区 */
#dictation-wrap { display: flex; flex-direction: column; gap: 6px; }
#dictation-textarea {
  width: 100%;
  min-height: 100px;
  background: rgba(255,255,255,0.82);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 12px;
  line-height: 1.5;
  outline: none;
  resize: vertical;
  font-family: inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}
#dictation-textarea:focus { border-color: rgba(10, 132, 255, 0.38); }
#dictation-actions { display: flex; gap: 6px; }

/* ===== 右栏 ===== */
#right-panel {
  width: 160px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  flex-shrink: 0;
  overflow: hidden;
}
#right-panel .panel-title {
  background: var(--surface-strong);
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
#segment-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.seg-item {
  padding: 8px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid transparent;
  border-radius: 14px;
  font-size: 12px;
  transition: background 0.15s ease, border-color 0.15s ease;
  margin-bottom: 6px;
}
.seg-item:hover { background: var(--surface-soft); border-color: var(--border); }
.seg-item .seg-time { color: var(--accent); font-family: monospace; font-weight: 600; }
.seg-item .seg-del {
  background: none;
  border: none;
  color: var(--text-soft);
  cursor: pointer;
  font-size: 11px;
  padding: 0;
}
.seg-item .seg-del:hover { color: var(--danger); }
#right-actions {
  padding: 12px;
  border-top: 1px solid var(--border);
}

/* ===== 批改对话框 ===== */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(20px);
}
#modal-overlay.open { display: flex; }
#modal-box {
  background: var(--surface-strong);
  border: 1px solid var(--border);
  border-radius: 24px;
  width: 700px;
  max-width: 95vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
  backdrop-filter: blur(24px);
}
#modal-header {
  background: var(--surface);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
#modal-header h2 { font-size: 14px; color: var(--text-primary); }
#modal-close { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; }
#modal-close:hover { color: var(--text-primary); }
#modal-body {
  display: flex;
  gap: 0;
  flex: 1;
  overflow: hidden;
}
.modal-col {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.modal-col:first-child { border-right: 1px solid var(--border); }
.modal-col label { font-size: 11px; color: var(--text-secondary); font-weight: 700; }
#my-answer-display {
  background: rgba(255,255,255,0.8);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.8;
  min-height: 100px;
  border: 1px solid var(--border);
}
#ref-answer-input {
  width: 100%;
  min-height: 120px;
  background: rgba(255,255,255,0.82);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 12px;
  resize: vertical;
  font-family: inherit;
}
#modal-footer {
  padding: 12px 16px;
  background: var(--surface);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  border-top: 1px solid var(--border);
}
.word-correct { color: var(--success); font-weight: 600; }
.word-wrong { color: var(--danger); font-weight: 600; text-decoration: line-through; }
.word-missing { color: var(--accent-warm); font-style: italic; }

/* ===== 原生文件输入 ===== */
.native-file-input {
  display: block;
  width: 100%;
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface-strong);
  color: var(--text-secondary);
  font: inherit;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
}
.native-file-input::-webkit-file-upload-button {
  margin-right: 10px;
  padding: 7px 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: #fff;
  font: inherit;
  cursor: pointer;
}
.native-file-input::file-selector-button {
  margin-right: 10px;
  padding: 7px 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-strong));
  color: #fff;
  font: inherit;
  cursor: pointer;
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-soft); }

/* ===== 无文件提示 ===== */
#no-file-hint {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  padding: 24px;
  text-align: center;
}
#no-file-hint .hint-banner {
  text-align: center;
  line-height: 1.8;
  padding: 10px 14px;
  background: rgba(255,255,255,0.78);
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 12px;
  color: var(--text-secondary);
}

/* ===== 手机适配 ===== */
@media (max-width: 900px) {
  body {
    height: auto;
    min-height: 100vh;
    overflow: auto;
    font-size: 14px;
  }

  #titlebar {
    padding: 10px 12px;
    flex-wrap: wrap;
    gap: 6px 10px;
  }
  #titlebar h1 { font-size: 16px; }
  #current-file-name {
    width: 100%;
    order: 3;
    font-size: 12px;
  }
  #play-status {
    margin-left: 0;
    margin-left: auto;
    order: 2;
  }
  #theme-switcher {
    order: 4;
    width: 100%;
    justify-content: flex-start;
  }

  #main-layout {
    flex-direction: column;
    overflow: visible;
    padding: 10px;
    gap: 10px;
  }

  #center-panel,
  #left-panel,
  #right-panel {
    width: 100%;
    min-width: 0;
    border: none;
  }

  #center-panel { order: 1; }
  #left-panel {
    order: 2;
  }
  #right-panel { order: 3; }

  #left-panel .panel-title,
  #right-panel .panel-title {
    padding: 10px 12px;
    font-size: 12px;
  }

  #file-list,
  #segment-list {
    max-height: 220px;
  }

  .file-item,
  .seg-item {
    padding: 10px 12px;
    font-size: 13px;
  }

  #left-actions,
  #right-actions {
    padding: 12px;
  }

  .btn,
  .ctrl-btn,
  #speed-select {
    min-height: 36px;
    font-size: 13px;
  }

  #player-bar {
    padding: 10px 12px;
  }

  #progress-row {
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
  }

  #time-display {
    min-width: 0;
    text-align: left;
  }

  #controls-row {
    gap: 8px;
  }

  #controls-row > span[style*="width:1px"] {
    display: none !important;
  }

  .note-block-title {
    font-size: 14px;
  }

  .note-rendered,
  .note-view,
  .note-edit,
  #dictation-textarea {
    font-size: 13px;
    min-height: 96px;
  }

  #dictation-actions {
    flex-wrap: wrap;
  }

  #modal-box {
    width: calc(100vw - 20px);
    max-width: calc(100vw - 20px);
    max-height: 88vh;
  }

  #modal-body {
    flex-direction: column;
  }

  .modal-col:first-child {
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
}

@media (max-width: 520px) {
  body {
    font-size: 15px;
  }

  #titlebar {
    padding: 10px;
  }

  #player-bar,
  #left-actions,
  #right-actions {
    padding-left: 10px;
    padding-right: 10px;
  }

  #left-panel,
  #right-panel,
  #player-bar,
  #no-file-hint,
  .note-block {
    border-radius: 18px;
  }

  .ctrl-btn {
    flex: 1 1 calc(50% - 8px);
    text-align: center;
    padding: 7px 8px;
  }

  #speed-select {
    width: 100%;
  }

  #ab-info {
    width: 100%;
    order: 10;
  }

  .file-item .fname,
  .seg-item .seg-time {
    font-size: 12px;
  }

  #modal-header,
  #modal-footer {
    padding: 10px;
  }

  .modal-col {

}

  <!-- 中栏 -->

<script>
// =============================

// =============================

  try { return JSON.parse(localStorage.getItem(key)) ?? def; }

}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

const THEMES = {

    textSecondary: '#88725b',

    accent: '#c98b2e',
    accentStrong: '#ad7421',
    accentSoft: 'rgba(201, 139, 46, 0.16)',
    accentWarm: '#ffb340',
    border: 'rgba(160, 128, 92, 0.24)',
    borderStrong: 'rgba(160, 128, 92, 0.36)',
    shadow: '0 20px 50px rgba(168, 142, 110, 0.16)',
    shadowSoft: '0 10px 26px rgba(168, 142, 110, 0.11)',
    danger: '#ff5f57',
    success: '#2bb673',
    modalOverlay: 'rgba(245, 236, 224, 0.52)',
    scrollbar: 'rgba(160, 128, 92, 0.44)'
  }
};

function syncThemeChips(name) {
  document.querySelectorAll('.theme-chip').forEach((chip) => {
    chip.classList.toggle('active', chip.dataset.theme === name);
  });
}

function applyTheme(name) {
  const themeName = THEMES[name] ? name : 'classic';
  const theme = THEMES[themeName];
  const root = document.documentElement.style;
  root.setProperty('--bg-start', theme.bgStart);
  root.setProperty('--bg-end', theme.bgEnd);
  root.setProperty('--surface', theme.surface);
  root.setProperty('--surface-strong', theme.surfaceStrong);
  root.setProperty('--surface-soft', theme.surfaceSoft);
  root.setProperty('--surface-muted', theme.surfaceMuted);
  root.setProperty('--text-primary', theme.textPrimary);
  root.setProperty('--text-secondary', theme.textSecondary);
  root.setProperty('--text-soft', theme.textSoft);
  root.setProperty('--accent', theme.accent);
  root.setProperty('--accent-strong', theme.accentStrong);
  root.setProperty('--accent-soft', theme.accentSoft);
  root.setProperty('--accent-warm', theme.accentWarm);
  root.setProperty('--border', theme.border);
  root.setProperty('--border-strong', theme.borderStrong);
  root.setProperty('--shadow', theme.shadow);
  root.setProperty('--shadow-soft', theme.shadowSoft);
  root.setProperty('--danger', theme.danger);
  root.setProperty('--success', theme.success);
  root.setProperty('--modal-overlay', theme.modalOverlay);
  root.setProperty('--scrollbar', theme.scrollbar);
  document.body.dataset.theme = themeName;
  syncThemeChips(themeName);
  try { localStorage.setItem('sitman-theme', themeName); } catch (e) {}
}

function fmtTime(s) {
  if (isNaN(s) || s < 0) s = 0;
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = (s % 60).toFixed(1);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(4,'0')}`;
  return `${m}:${String(sec).padStart(4,'0')}`;
}

function parseTimestamp(str) {
  // [MM:SS.s] or [HH:MM:SS.s]
  const m2 = str.match(/\[(\d+):(\d+\.?\d*)\]/);
  if (m2) return parseInt(m2[1]) * 60 + parseFloat(m2[2]);
  const m3 = str.match(/\[(\d+):(\d+):(\d+\.?\d*)\]/);
  if (m3) return parseInt(m3[1]) * 3600 + parseInt(m3[2]) * 60 + parseFloat(m3[3]);
  return null;
}

function seekTo(t) {
  if (!audio.src) return;
  const dur = audio.duration;
  if (!isNaN(dur) && dur > 0) {
    audio.currentTime = Math.max(0, Math.min(t, dur));
  }
}

// =============================
// 工具：生成文件唯一ID
// =============================
function makeFileId(file) {
  return `${file.name}_${file.size}_${file.lastModified}`;
}

// =============================
// 状态
// =============================
const audio = document.getElementById('audio-player');
let currentFileName = null;  // 显示用，file.name
let currentFileId = null;    // 操作用，makeFileId 生成
let fileRegistry = {};   // fileId -> File object (runtime only)
let currentBlobUrl = null; // A5：跟踪当前 blob URL，切换时 revoke 防内存泄露
let pointA = null;
let pointB = null;
let abLoopEnabled = false;
let abRafId = null;
let isDraggingProgress = false;
let saveDebounceTimers = {};

// =============================
// 文件管理
// =============================
function triggerFileInput() {
  document.getElementById('file-input').click();
}

function triggerFolderInput() {
  document.getElementById('folder-input').click();
}

const MEDIA_TYPES = /^(audio|video)\//;
const MEDIA_EXTENSIONS = /\.(mp3|m4a|aac|wav|flac|ogg|mp4|mov|m4v|webm)$/i;

function isMediaFile(file) {
  return MEDIA_TYPES.test(file.type || '') || MEDIA_EXTENSIONS.test(file.name || '');
}

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) {
    document.getElementById('play-status').textContent = '未选择文件';
    return;
  }
  document.getElementById('play-status').textContent = `读取中 ${file.name}`;
  registerFile(file);
  e.target.value = '';
});

document.getElementById('folder-input').addEventListener('change', function(e) {
  const files = Array.from(e.target.files).filter(f => isMediaFile(f) && !f.name.startsWith('._'));
  if (files.length === 0) {
    document.getElementById('play-status').textContent = '未识别到可导入媒体';
    return;
  }
  document.getElementById('play-status').textContent = `批量导入 ${files.length} 个文件`;
  files.forEach(f => registerFile(f));
  e.target.value = '';
});

function registerFile(file) {
  const name = file.name;
  const fileId = makeFileId(file);
  document.getElementById('play-status').textContent = `已选择 ${name}`;
  fileRegistry[fileId] = file;

  // 持久化文件列表（对象数组）
  const list = lsGet('sitman_files', []);
  // 兼容旧格式（字符串数组 → 对象数组）
  const normalizedList = list.map(item => typeof item === 'string' ? {name: item, fileId: item} : item);
  if (!normalizedList.some(item => item.fileId === fileId)) {
    normalizedList.push({name, fileId});
    lsSet('sitman_files', normalizedList);
  }

  renderFileList();
  activateFile(fileId, name);
}

function renderFileList() {
  const rawList = lsGet('sitman_files', []);
  // 兼容旧格式
  const list = rawList.map(item => typeof item === 'string' ? {name: item, fileId: item} : item);
  const container = document.getElementById('file-list');
  container.innerHTML = '';
  list.forEach(entry => {
    const {name, fileId} = entry;
    const item = document.createElement('div');
    item.className = 'file-item' + (fileId === currentFileId ? ' active' : '');
    item.innerHTML = `
      <span class="fname" title="${escHtml(name)}">${escHtml(name)}</span>
      <button class="del-btn" title="删除">✕</button>
    `;
    item.querySelector('.fname').addEventListener('click', () => activateFile(fileId, name));
    item.querySelector('.fname').addEventListener('dblclick', () => {
      activateFile(fileId, name);
      if (fileRegistry[fileId]) audio.play().catch(err => {
        document.getElementById('play-status').textContent = '播放失败: ' + err.message;
      });
    });
    item.querySelector('.del-btn').addEventListener('click', (e) => deleteFile(e, fileId));
    container.appendChild(item);
  });
}

function activateFile(fileId, name) {
  clearAB();
  currentFileId = fileId;
  currentFileName = name;
  document.getElementById('current-file-name').textContent = name;
  renderFileList();
  renderSegmentList();
  loadNotes();

  const file = fileRegistry[fileId];
  if (file) {
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); }
    currentBlobUrl = URL.createObjectURL(file);
    audio.src = currentBlobUrl;
    // 切换文件时重置播放按钮状态（audio.src 赋值触发 emptied 而非 pause）
    document.getElementById('btn-play').textContent = '▶ 播放';
    document.getElementById('play-status').textContent = '●';
    document.getElementById('no-file-hint').style.display = 'none';
    document.getElementById('notes-area').style.display = 'flex';
    // 渲染初始 view
    renderEditorView('vocab-editor', 'vocab-view');
    renderEditorView('keypoints-editor', 'keypoints-view');
  } else {
    // A-5：文件未重新导入，但 notes-area 仍显示标注内容，顶部显示横幅提示
    audio.src = '';
    const hint = document.getElementById('no-file-hint');
    hint.style.display = 'flex';
    hint.innerHTML = `<div class="hint-banner">
      ⚠️ 音频文件需重新关联，请点击左侧"导入音频"重新选择：${escHtml(name)}
    </div>`;
    hint.style.cssText = 'display:block;flex:none;';
    document.getElementById('notes-area').style.display = 'flex';
    // 渲染初始 view
    renderEditorView('vocab-editor', 'vocab-view');
    renderEditorView('keypoints-editor', 'keypoints-view');
  }
}

function deleteFile(e, fileId) {
  e.stopPropagation();
  const rawList = lsGet('sitman_files', []);
  const list = rawList.map(item => typeof item === 'string' ? {name: item, fileId: item} : item)
                      .filter(item => item.fileId !== fileId);
  lsSet('sitman_files', list);
  delete fileRegistry[fileId];
  if (currentFileId === fileId) {
    currentFileId = null;
    currentFileName = null;
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; } // A5
    audio.src = '';
    document.getElementById('current-file-name').textContent = '未选择文件';
    const hint = document.getElementById('no-file-hint');
    hint.style.cssText = '';
    hint.style.display = 'flex';
    hint.textContent = '← 点击左侧"导入音频"开始使用';
    document.getElementById('notes-area').style.display = 'none';
  }
  renderFileList();
}

function clearAllFiles() {
  if (!confirm('确定清空整个播放列表吗？')) return;
  lsSet('sitman_files', []);
  for (const id in fileRegistry) delete fileRegistry[id];
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  audio.src = '';
  currentFileId = null;
  currentFileName = null;
  clearAB();
  document.getElementById('current-file-name').textContent = '未选择文件';
  document.getElementById('btn-play').textContent = '▶ 播放';
  document.getElementById('play-status').textContent = '●';
  const hint = document.getElementById('no-file-hint');
  hint.style.cssText = '';
  hint.style.display = 'flex';
  hint.textContent = '← 点击左侧"导入音频"开始使用';
  document.getElementById('notes-area').style.display = 'none';
  renderFileList();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

document.querySelectorAll('.theme-chip').forEach((chip) => {
  chip.addEventListener('click', () => applyTheme(chip.dataset.theme));
});

// =============================
// 播放控制
// =============================
function togglePlay() {
  if (!audio.src) return;
  if (audio.paused) {
    audio.play().catch(err => {
      document.getElementById('play-status').textContent = '播放失败: ' + err.message;
    });
  } else {
    audio.pause();
  }
}

function stopAudio() {
  audio.pause();
  audio.currentTime = 0;
}

function skip(delta) {
  if (!audio.src) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + delta));
}

function setSpeed(val) {
  audio.playbackRate = parseFloat(val);
}

audio.addEventListener('play', () => {
  document.getElementById('btn-play').textContent = '⏸ 暂停';
  document.getElementById('play-status').textContent = '▶ 播放中';
});
audio.addEventListener('pause', () => {
  document.getElementById('btn-play').textContent = '▶ 播放';
  document.getElementById('play-status').textContent = '⏸ 已暂停';
});
audio.addEventListener('ended', () => {
  document.getElementById('btn-play').textContent = '▶ 播放';
  document.getElementById('play-status').textContent = '⏹ 已结束';
});

// 进度条
const progressBar = document.getElementById('progress-bar');

progressBar.addEventListener('mousedown', () => { isDraggingProgress = true; });
progressBar.addEventListener('touchstart', () => { isDraggingProgress = true; }, {passive:true});

progressBar.addEventListener('input', () => {
  if (!audio.duration) return;
  const t = (progressBar.value / 100) * audio.duration;
  document.getElementById('time-display').textContent = fmtTime(t) + ' / ' + fmtTime(audio.duration);
});

progressBar.addEventListener('change', () => {
  if (!audio.duration) return;
  audio.currentTime = (progressBar.value / 100) * audio.duration;
  isDraggingProgress = false;
});

progressBar.addEventListener('mouseup', () => { isDraggingProgress = false; });
progressBar.addEventListener('touchend', () => { isDraggingProgress = false; }, {passive:true});

audio.addEventListener('timeupdate', () => {
  if (!isDraggingProgress && audio.duration) {
    progressBar.value = (audio.currentTime / audio.duration) * 100;
    document.getElementById('time-display').textContent =
      fmtTime(audio.currentTime) + ' / ' + fmtTime(audio.duration);
  }
  checkAB(); // A1：timeupdate 主检测，精度远高于 setInterval
});

audio.addEventListener('loadedmetadata', () => {
  progressBar.value = 0;
  document.getElementById('time-display').textContent = '0:00.0 / ' + fmtTime(audio.duration);
});

// =============================
// A-B 循环
// =============================
function setPointA() {
  pointA = audio.currentTime;
  updateABInfo();
  updateABMarkers();
}
function setPointB() {
  pointB = audio.currentTime;
  updateABInfo();
  updateABMarkers();
}
function updateABMarkers() {
  const dur = audio.duration;
  const ma = document.getElementById('marker-a');
  const mb = document.getElementById('marker-b');
  if (!ma || !mb || isNaN(dur) || dur === 0) return;
  if (pointA !== null) { ma.style.left = (pointA / dur * 100) + '%'; ma.style.display = 'block'; }
  if (pointB !== null) { mb.style.left = (pointB / dur * 100) + '%'; mb.style.display = 'block'; }
}
function clearAB() {
  pointA = null; pointB = null;
  abLoopEnabled = false;
  cancelAnimationFrame(abRafId);
  abRafId = null;
  document.getElementById('btn-ab-loop').classList.remove('active');
  // 隐藏标记
  const ma = document.getElementById('marker-a');
  const mb = document.getElementById('marker-b');
  if (ma) ma.style.display = 'none';
  if (mb) mb.style.display = 'none';
  updateABInfo();
}
function toggleABLoop() {
  if (!abLoopEnabled && (pointA === null || pointB === null)) {
    document.getElementById('play-status').textContent = '请先设置A点和B点';
    return;
  }
  abLoopEnabled = !abLoopEnabled;
  const btn = document.getElementById('btn-ab-loop');
  if (abLoopEnabled) {
    btn.classList.add('active');
    cancelAnimationFrame(abRafId);
    abRafId = requestAnimationFrame(abRafLoop);
  } else {
    btn.classList.remove('active');
    cancelAnimationFrame(abRafId);
    abRafId = null;
  }
}
function checkAB() {
  // timeupdate 兜底：后台节流时 rAF 暂停，由此补漏
  if (!abLoopEnabled || pointA === null || pointB === null) return;
  if (audio.paused) return;
  const a = Math.min(pointA, pointB);
  const b = Math.max(pointA, pointB);
  if (audio.currentTime >= b) {
    audio.currentTime = a;
  }
}

function abRafLoop() {
  if (!abLoopEnabled || pointA === null || pointB === null) {
    abRafId = null;
    return;
  }
  if (!audio.paused && audio.currentTime >= Math.max(pointA, pointB)) {
    audio.currentTime = Math.min(pointA, pointB);
  }
  abRafId = requestAnimationFrame(abRafLoop);
}
function updateABInfo() {
  const a = pointA !== null ? fmtTime(pointA) : '--';
  const b = pointB !== null ? fmtTime(pointB) : '--';
  document.getElementById('ab-info').textContent = `A:${a} B:${b}`;
}

// =============================
// 分段点
// =============================
function segKey(fileId) { return `sitman_segments_${fileId}`; }

function getSegments() {
  if (!currentFileId) return [];
  return lsGet(segKey(currentFileId), []);
}
function saveSegments(segs) {
  if (!currentFileId) return;
  lsSet(segKey(currentFileId), segs);
}

function addSegment() {
  if (!audio.src || !currentFileId) return;
  const t = audio.currentTime;
  const segs = getSegments();
  const isDup = segs.some(s => Math.abs(s - t) < 0.1);
  if (isDup) return;
  segs.push(t);
  segs.sort((a, b) => a - b);
  saveSegments(segs);
  renderSegmentList();
}

function deleteSegment(idx) {
  const segs = getSegments();
  segs.splice(idx, 1);
  saveSegments(segs);
  renderSegmentList();
}

function renderSegmentList() {
  const container = document.getElementById('segment-list');
  container.innerHTML = '';
  const segs = getSegments();
  segs.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'seg-item';
    item.innerHTML = `
      <span class="seg-time">${fmtTime(t)}</span>
      <button class="seg-del" onclick="deleteSegment(${i})" title="删除">✕</button>
    `;
    item.querySelector('.seg-time').addEventListener('click', () => seekTo(t));
    container.appendChild(item);
  });
}

// =============================
// 标注内容 — contenteditable
// =============================
function notesKey(fileId) { return `sitman_notes_${fileId}`; }

function loadNotes() {
  if (!currentFileId) return;
  const data = lsGet(notesKey(currentFileId), {vocab:'', keypoints:'', dictation:''});
  setEditorText('vocab-editor', data.vocab || '');
  setEditorText('keypoints-editor', data.keypoints || '');
  document.getElementById('dictation-textarea').value = data.dictation || '';
}

function saveNotes() {
  if (!currentFileId) return;
  const data = {
    vocab: getEditorText('vocab-editor'),
    keypoints: getEditorText('keypoints-editor'),
    dictation: document.getElementById('dictation-textarea').value
  };
  lsSet(notesKey(currentFileId), data);
}

// 将纯文本存入 contenteditable，不做 innerHTML 注入
function setEditorText(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
}

function getEditorText(id) {
  return document.getElementById(id).textContent;
}

// MutationObserver debounce 自动保存 contenteditable
function setupEditorObserver(id) {
  const el = document.getElementById(id);
  const observer = new MutationObserver(() => {
    clearTimeout(saveDebounceTimers[id]);
    saveDebounceTimers[id] = setTimeout(saveNotes, DEBOUNCE_MS);
  });
  observer.observe(el, { childList: true, characterData: true, subtree: true });
}

// 将 editor 文本渲染为可点击时间戳 view
function renderEditorView(editorId, viewId) {
  const editor = document.getElementById(editorId);
  const view = document.getElementById(viewId);
  const text = editor.textContent || '';
  // 转义 HTML，然后把时间戳替换为可点击 span
  const escaped = escHtml(text);
  const rendered = escaped.replace(
    /\[(\d+:\d+(?::\d+)?\.?\d*)\]/g,
    (match, ts) => {
      const secs = parseTimestamp('[' + ts + ']');
      return secs !== null
        ? `<span class="ts-link" data-time="${secs}">[${ts}]</span>`
        : match;
    }
  );
  view.innerHTML = rendered;
  // 绑定点击事件
  view.querySelectorAll('.ts-link').forEach(span => {
    span.onclick = () => seekTo(parseFloat(span.dataset.time));
  });
}

// focusin/focusout 切换 editor 和 view
function setupEditorToggle(editorId, viewId) {
  const editor = document.getElementById(editorId);
  const view = document.getElementById(viewId);

  editor.addEventListener('focusin', () => {
    view.style.display = 'none';
    editor.style.display = 'block';
  });

  editor.addEventListener('focusout', () => {
    editor.style.display = 'none';
    view.style.display = 'block';
    renderEditorView(editorId, viewId);
  });

  // view 点击时切回 editor
  view.addEventListener('click', (e) => {
    if (e.target.classList.contains('ts-link')) return; // 时间戳点击不切换
    view.style.display = 'none';
    editor.style.display = 'block';
    editor.focus();
  });

  // 初始状态：隐藏编辑器，显示渲染视图
  editor.style.display = 'none';
  view.style.display = 'block';
}

// textarea 自动保存
document.getElementById('dictation-textarea').addEventListener('input', () => {
  clearTimeout(saveDebounceTimers['dictation']);
  saveDebounceTimers['dictation'] = setTimeout(saveNotes, DEBOUNCE_MS);
});

// A2：页面关闭/切换时强制同步保存，防止 debounce 未完成就丢失数据
window.addEventListener('beforeunload', () => {
  saveNotes();
});
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') saveNotes();
});

// 折叠控制
function toggleBlock(name) {
  const body = document.getElementById('body-' + name);
  const toggle = document.getElementById('toggle-' + name);
  if (body.classList.contains('collapsed')) {
    body.classList.remove('collapsed');
    toggle.textContent = '▼';
  } else {
    body.classList.add('collapsed');
    toggle.textContent = '▶';
  }
}

// =============================
// 听写批改
// =============================
function openGradingModal() {
  const myText = document.getElementById('dictation-textarea').value.trim();
  // 显示我的输入
  document.getElementById('my-answer-display').textContent = myText || '（无内容）';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeGradingModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function runGrading() {
  const myText = document.getElementById('dictation-textarea').value.trim();
  const refText = document.getElementById('ref-answer-input').value.trim();

  if (!refText) {
    document.getElementById('my-answer-display').textContent = myText || '（无内容）';
    return;
  }

  const myWords = tokenize(myText);
  const refWords = tokenize(refText);

  // 简单逐词对比（最长公共子序列）
  const diff = lcsAlign(myWords, refWords);
  let html = '';
  diff.forEach(item => {
    if (item.type === 'match') {
      html += `<span class="word-correct">${escHtml(item.word)}</span> `;
    } else if (item.type === 'wrong') {
      html += `<span class="word-wrong">${escHtml(item.word)}</span> `;
    } else if (item.type === 'missing') {
      html += `<span class="word-missing">[${escHtml(item.word)}]</span> `;
    }
  });
  document.getElementById('my-answer-display').innerHTML = html || '（无内容）';
}

function tokenize(text) {
  return text.toLowerCase().replace(/[^\w\s\u4e00-\u9fff]/g, ' ').split(/\s+/).filter(Boolean);
}

// LCS 对齐，返回 [{type:'match'|'wrong'|'missing', word}]
function lcsAlign(a, b) {
  const MAX_WORDS = 500;
  if (a.length > MAX_WORDS) a = a.slice(0, MAX_WORDS);
  if (b.length > MAX_WORDS) b = b.slice(0, MAX_WORDS);
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
    if (a[i-1]===b[j-1]) dp[i][j]=dp[i-1][j-1]+1;
    else dp[i][j]=Math.max(dp[i-1][j],dp[i][j-1]);
  }
  // 回溯
  const result = [];
  let i=m, j=n;
  while (i>0 || j>0) {
    if (i>0 && j>0 && a[i-1]===b[j-1]) {
      result.unshift({type:'match', word: a[i-1]});
      i--; j--;
    } else if (j>0 && (i===0 || dp[i][j-1]>=dp[i-1][j])) {
      result.unshift({type:'missing', word: b[j-1]});
      j--;
    } else {
      result.unshift({type:'wrong', word: a[i-1]});
      i--;
    }
  }
  return result;
}

// 点击 overlay 关闭
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeGradingModal();
});

// =============================
// 初始化
// =============================
function init() {
  applyTheme(lsGet('sitman-theme', 'classic'));

  // 渲染文件列表
  renderFileList();

  // 设置 contenteditable observers 和 editor/view 切换
  setupEditorObserver('vocab-editor');
  setupEditorObserver('keypoints-editor');
  setupEditorToggle('vocab-editor', 'vocab-view');
  setupEditorToggle('keypoints-editor', 'keypoints-view');

  // A-5：如果有文件列表，激活第一个，notes-area 直接显示（即使没有 File 对象）
  const rawList = lsGet('sitman_files', []);
  const list = rawList.map(item => typeof item === 'string' ? {name: item, fileId: item} : item);
  if (list.length > 0 && !currentFileId) {
    const first = list[0];
    currentFileId = first.fileId;
    currentFileName = first.name;
    document.getElementById('current-file-name').textContent = first.name;
    renderFileList();
    renderSegmentList();
    loadNotes();
    // 显示标注区
    document.getElementById('notes-area').style.display = 'flex';
    // 顶部横幅提示需重新关联
    const hint = document.getElementById('no-file-hint');
    hint.style.cssText = 'display:block;flex:none;';
    hint.innerHTML = `<div class="hint-banner">
      ⚠️ 音频文件需重新关联，请点击左侧"导入音频"重新选择：${escHtml(first.name)}
    </div>`;
    // 渲染初始 view
    renderEditorView('vocab-editor', 'vocab-view');
    renderEditorView('keypoints-editor', 'keypoints-view');
  }
}

init();
</script>
